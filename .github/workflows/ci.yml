name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    container: debian:unstable
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-vte-3.91 \
            gir1.2-webkit-6.0 \
            gir1.2-gtksource-5 \
            gir1.2-pango-1.0 \
            python3-markdown-it \
            python3-mdit-py-plugins \
            python3-yaml \
            python3-watchdog \
            fzf \
            python3-pyfzf \
            ripgrep \
            python3-pytest \
            python3-mypy \
            python3-ruff \
            make \
            python3-venv
      - name: Run lint
        run: |
          python3 -m venv .venv
          .venv/bin/pip install tach
          make lint
          make tach

  test-unit:
    runs-on: ubuntu-latest
    container: debian:unstable
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-vte-3.91 \
            gir1.2-webkit-6.0 \
            gir1.2-gtksource-5 \
            gir1.2-pango-1.0 \
            python3-markdown-it \
            python3-mdit-py-plugins \
            python3-yaml \
            python3-tomli-w \
            python3-watchdog \
            fzf \
            python3-pyfzf \
            ripgrep \
            python3-pytest \
            xvfb \
            make
      - name: Run unit tests
        run: make test

  test-gui:
    runs-on: ubuntu-latest
    container: debian:unstable
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y \
            python3-gi \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-vte-3.91 \
            gir1.2-webkit-6.0 \
            gir1.2-gtksource-5 \
            gir1.2-pango-1.0 \
            python3-markdown-it \
            python3-mdit-py-plugins \
            python3-yaml \
            python3-tomli-w \
            python3-watchdog \
            fzf \
            python3-pyfzf \
            ripgrep \
            python3-pytest \
            xvfb \
            make
      - name: Run GUI tests (dummy for now)
        run: make test-gui
